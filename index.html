<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Outreach LinkedIn · DC Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --fondo:#0c0d10; --pann:#131419; --linea:#22242c; --linea2:#2e3140;
    --testo:#e9ebf1; --dim:#7d8494;
    --acc:#5b8cff; --verde:#3ecf8e; --rosso:#f06a6a; --ambra:#f5b95f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--fondo);color:var(--testo);font:14px/1.6 'Manrope',sans-serif;min-height:100vh;padding:40px clamp(16px,5vw,72px) 80px}
  main{max-width:880px;margin:0 auto}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
  h1 span{color:var(--acc)}
  #agg{color:var(--dim);font:400 11px/1.6 'JetBrains Mono',monospace;margin-top:4px}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  .chip{display:inline-flex;align-items:center;gap:8px;font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;padding:7px 13px;border-radius:6px;color:var(--verde);border:1px solid rgba(62,207,142,.25)}
  .vivo{width:6px;height:6px;border-radius:50%;background:var(--verde);animation:batte 2.2s infinite}
  @keyframes batte{0%{box-shadow:0 0 0 0 rgba(62,207,142,.5)}70%{box-shadow:0 0 0 7px rgba(62,207,142,0)}100%{box-shadow:0 0 0 0 rgba(62,207,142,0)}}

  /* KPI */
  .kpis{display:flex;flex-wrap:wrap;background:var(--pann);border:1px solid var(--linea);border-radius:12px;overflow:hidden;margin-bottom:28px}
  .kpi{flex:1;min-width:110px;padding:14px 18px;border-left:1px solid var(--linea);cursor:pointer;transition:background .15s}
  .kpi:first-child{border-left:none;background:rgba(62,207,142,.06)}
  .kpi:hover{background:rgba(91,140,255,.07)}
  .kpi .v{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .kpi .v small{font-size:12px;color:var(--dim);font-weight:600}
  .kpi .v.verde{color:var(--verde)} .kpi .v.acc{color:var(--acc)} .kpi .v.rosso{color:var(--rosso)}
  .kpi .e{font:600 9px/1.3 'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:5px}

  /* blocchi */
  h2{font:800 12px/1 'Manrope',sans-serif;letter-spacing:.14em;text-transform:uppercase;margin:30px 0 12px;display:flex;align-items:center;gap:10px}
  h2 .cnt{font:600 10px/1 'JetBrains Mono',monospace;border:1px solid var(--linea2);border-radius:99px;padding:4px 9px;color:var(--dim)}
  h2.dafare{color:var(--ambra)}
  h2.fatto{color:var(--verde)}
  .riga{display:flex;align-items:baseline;gap:12px;background:var(--pann);border:1px solid var(--linea);border-radius:10px;padding:11px 16px;margin-bottom:6px;font-size:13.5px;line-height:1.5}
  .riga:hover{border-color:var(--linea2)}
  .riga .quando{font:400 11px/1.6 'JetBrains Mono',monospace;color:var(--dim);white-space:nowrap;min-width:86px}
  .riga .chi-b{font-weight:800}
  .riga.urgente{border-color:rgba(245,185,95,.4);background:linear-gradient(90deg,rgba(245,185,95,.06),transparent 55%)}
  .riga a{color:var(--acc);text-decoration:none;font-weight:600;white-space:nowrap;margin-left:auto}
  .riga a:hover{text-decoration:underline}
  .vuoto{color:var(--dim);font-size:13px;padding:12px 4px}

  /* lista lead */
  .filtri{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
  .filtro{font:600 11px/1 'Manrope',sans-serif;cursor:pointer;padding:8px 14px;border-radius:99px;background:transparent;border:1px solid var(--linea);color:var(--dim);transition:all .15s}
  .filtro:hover{color:var(--testo);border-color:var(--linea2)}
  .filtro.on{background:rgba(91,140,255,.14);border-color:rgba(91,140,255,.5);color:var(--acc)}
  .filtro .fn{font:600 10px/1 'JetBrains Mono',monospace;opacity:.75;margin-left:5px}

  .scheda{background:var(--pann);border:1px solid var(--linea);border-radius:10px;margin-bottom:6px}
  .scheda.aperta{border-color:rgba(91,140,255,.45)}
  .testata{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;flex-wrap:wrap}
  .pallino{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .pallino.coda{background:var(--dim)} .pallino.inviato{background:var(--acc)}
  .pallino.risposto{background:var(--verde)} .pallino.prenotato{background:var(--ambra)} .pallino.rev{background:var(--rosso)}
  .chi{flex:1;min-width:220px}
  .chi .n{font-size:14.5px;font-weight:800}
  .chi .r{color:var(--dim);font-size:12.5px;margin-left:8px}
  .chi .r.r-attesa{color:var(--ambra);font-style:italic}
  .ic-riga{font:600 11.5px/1.6 'JetBrains Mono',monospace;color:var(--dim);display:block;margin-top:3px}
  .ic-riga .ic-ok{color:var(--verde)} .ic-riga .ic-attivo{color:var(--ambra)}
  .profilo-l{font:600 11px/1 'Manrope',sans-serif;color:var(--acc);text-decoration:none;white-space:nowrap}
  .x{width:26px;height:26px;border-radius:7px;border:1px solid var(--linea);background:transparent;color:var(--dim);cursor:pointer;font-size:12px}
  .x:hover{border-color:var(--rosso);color:var(--rosso)}

  .corpo{display:none;border-top:1px solid var(--linea);padding:14px 16px}
  .scheda.aperta .corpo{display:block}
  .box-msg{background:var(--fondo);border:1px solid var(--linea);border-radius:8px;padding:10px 13px;font-size:13px;line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
  .box-msg b{color:var(--dim);font:600 10px/1 'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px}
  .box-msg.loro{border-left:2px solid var(--verde)}
  textarea{width:100%;min-height:90px;resize:vertical;background:var(--fondo);border:1px solid var(--linea);border-radius:8px;color:var(--testo);padding:10px 13px;font:13px/1.6 'Manrope',sans-serif}
  textarea:focus{outline:none;border-color:var(--acc)}
  .azioni{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .btn{font:800 11px/1 'Manrope',sans-serif;padding:9px 15px;border-radius:8px;cursor:pointer;background:var(--acc);border:1px solid var(--acc);color:#fff}
  .btn.verde{background:var(--verde);border-color:var(--verde);color:#0a2417}
  .btn.ghost{background:transparent;color:var(--dim);border-color:var(--linea)}
  .btn.pericolo{background:transparent;border-color:rgba(240,106,106,.4);color:var(--rosso)}
  .esito{font-size:12px}
  .prossimo-passo{margin-top:10px;padding:10px 13px;border-left:2px solid var(--ambra);font-size:13px;line-height:1.6;background:rgba(245,185,95,.06);border-radius:0 8px 8px 0}
  .prossimo-passo b{color:var(--ambra)}
  .nota-msg{color:var(--dim);font-size:12px;margin-top:8px}
  details.archivio{margin-top:36px;opacity:.45}
  details.archivio:hover,details.archivio[open]{opacity:1}
  details.archivio summary{cursor:pointer;font:600 10.5px/1 'JetBrains Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);padding:10px 0}
  ::-webkit-scrollbar{width:8px} ::-webkit-scrollbar-thumb{background:var(--linea2);border-radius:4px}
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Outreach <span>LinkedIn</span></h1>
      <div id="agg">caricamento…</div>
    </div>
    <span class="chip"><span class="vivo"></span>DC Academy · Live</span>
  </header>

  <div class="kpis">
    <div class="kpi" onclick="setFiltro('prenotato')"><div class="v verde" id="k_pren">–</div><div class="e">🎯 Call prenotate</div></div>
    <div class="kpi" onclick="setFiltro('tutti')"><div class="v" id="k_tot">–</div><div class="e">Lead totali</div></div>
    <div class="kpi" onclick="setFiltro('inviati')"><div class="v" id="k_inv">–</div><div class="e">Contattati</div></div>
    <div class="kpi" onclick="setFiltro('risposto')"><div class="v" id="k_ris">–</div><div class="e">Hanno risposto</div></div>
    <div class="kpi" onclick="setFiltro('calendly')"><div class="v acc" id="k_cal">–</div><div class="e">🔗 Calendly inviati</div></div>
    <div class="kpi" onclick="setFiltro('approvare')"><div class="v rosso" id="k_app">–</div><div class="e">Da approvare</div></div>
  </div>

  <h2 class="dafare">⚡ Da fare <span class="cnt" id="df_cnt">0</span></h2>
  <div id="dafare"></div>

  <h2 class="fatto">✅ Fatto di recente <span class="cnt" id="ft_cnt">0</span></h2>
  <div id="fatto"></div>

  <h2>📋 Lead</h2>
  <div class="filtri" id="filtri"></div>
  <div id="lista"></div>

  <details class="archivio"><summary id="arch_t">Archivio esclusi</summary><div id="esclusi"></div></details>
</main>

<script>
let aperti={};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function parseTs(s){
  if(!s||s===true) return null;
  s=String(s);
  let d=new Date(s.replace(' ','T'));
  if(isNaN(d)) d=new Date(s.slice(0,10)+'T12:00:00');
  return isNaN(d)?null:d;
}
function fmt(ts){const d=parseTs(ts);return d?d.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';}
function fmtData(ts){const d=parseTs(ts);return d?d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}):'';}

function dateSeguiti(x){
  let base=parseTs(x.inviato); const out=[];
  (x.seguiti||[]).forEach(function(f){
    let due=base?new Date(base):null;
    if(due) due.setDate(due.getDate()+f.dopo_giorni);
    out.push({n:f.n,due:due,inviato:f.inviato,testo:f.testo});
    base=f.inviato?parseTs(f.inviato):due;
  });
  return out;
}
function msgCount(x){return (x.inviato?1:0)+(x.seguiti||[]).filter(function(f){return f.inviato}).length;}
function calCount(x){
  let n=0;
  if(x.inviato&&(x.messaggio||'').indexOf('calendly.com')>-1)n++;
  if((x.risposta_conferma||'').indexOf('calendly.com')>-1)n++;
  (x.seguiti||[]).forEach(function(f){if(f.inviato&&(f.testo||'').indexOf('calendly.com')>-1)n++;});
  return n;
}
function seguitoDovuto(x){
  if(!x.inviato||x.risposto||x.escluso||x.stop_seguiti||!x.seguiti) return null;
  if(x.tipo==='collegamento'&&x.collegamento_accettato!==true) return null;
  const adesso=new Date();
  const lista=dateSeguiti(x);
  for(let i=0;i<lista.length;i++){
    if(lista[i].inviato) continue;
    return (lista[i].due&&lista[i].due<=adesso)?lista[i].n:null;
  }
  return null;
}
function prossimoTocco(x){
  const l=dateSeguiti(x).filter(function(f){return !f.inviato});
  return l.length?l[0].due:null;
}
function nonVerificato(x){return x.ruolo==='DA VERIFICARE'||!x.ruolo;}
function ruoloVisibile(x){return nonVerificato(x)?'⏳ ruolo da verificare':x.ruolo;}
function classePallino(x){
  if(x.prenotato)return 'prenotato';
  if(x.risposto)return 'risposto';
  if(x.inviato)return 'inviato';
  if(!x.approvato&&!x.escluso)return 'rev';
  return 'coda';
}
function statoIcone(x){
  if(x.escluso)return '<span class="ic-riga">✕ escluso</span>';
  if(x.prenotato)return '<span class="ic-riga ic-ok">📅 call prenotata</span>';
  const parti=[];
  const cnt=msgCount(x); if(cnt>0)parti.push('📨&nbsp;'+cnt);
  const cal=calCount(x); if(cal>0)parti.push('<span class="ic-ok">🔗&nbsp;'+cal+'</span>');
  if(x.risposto){
    parti.push(x.gestito?'<span class="ic-ok">💬 risposto · gestito</span>':'<span class="ic-attivo">💬 risposto · DA GESTIRE</span>');
    if(x.gestito&&x.prossima_azione&&x.prossima_azione.quando)parti.push('<span class="ic-attivo">📌 '+fmtData(x.prossima_azione.quando)+'</span>');
  }else if(x.inviato){
    const t=prossimoTocco(x);
    parti.push(t?'🕐&nbsp;prossimo '+fmtData(t):'👁 in attesa');
  }else if(x.in_pausa){parti.push('⏸ in pausa');}
  else if(!x.approvato){parti.push('⏳ da approvare');}
  else{parti.push('🕐 in coda');}
  return '<span class="ic-riga">'+parti.join(' &nbsp;·&nbsp; ')+'</span>';
}
function breve(s,n){s=(s||'').split(/[.;]/)[0];return s.length>n?s.slice(0,n)+'…':s;}

/* ---- DA FARE ---- */
function listaDaFare(c){
  const oggi=new Date(); const items=[];
  c.filter(function(x){return !x.escluso}).forEach(function(x){
    if(x.risposto&&!x.gestito&&!x.prenotato)
      items.push({p:0,html:'💬 <span class="chi-b">'+esc(x.nome)+'</span> ha risposto: <b>rispondere nel thread</b>',urg:true,link:x.profilo});
    const n=seguitoDovuto(x);
    if(n) items.push({p:1,html:'📨 <span class="chi-b">'+esc(x.nome)+'</span>: seguito '+n+' pronto, parte con la routine delle 18:40',urg:false});
    const pa=x.prossima_azione;
    if(pa&&pa.quando){
      const d=parseTs(pa.quando); const diff=(d-oggi)/864e5;
      if(diff<=3) items.push({p:diff<0?0:2,html:'📌 <span class="chi-b">'+esc(x.nome)+'</span> entro '+fmtData(pa.quando)+': '+esc(breve(pa.cosa,90)),urg:diff<0,link:x.profilo});
    }
  });
  const daAppr=c.filter(function(x){return !x.escluso&&!x.inviato&&!x.approvato}).length;
  if(daAppr) items.push({p:3,html:'⏳ <span class="chi-b">'+daAppr+' messaggi</span> scritti e in attesa della tua approvazione (clicca Da approvare in alto)',urg:false});
  return items.sort(function(a,b){return a.p-b.p});
}

/* ---- FATTO ---- */
function listaFatto(c){
  const ev=[];
  c.forEach(function(x){
    const t0=parseTs(x.inviato);
    if(t0) ev.push({t:t0,html:'📨 Primo messaggio a <span class="chi-b">'+esc(x.nome)+'</span>'});
    (x.seguiti||[]).forEach(function(f){
      const tf=parseTs(f.inviato);
      if(tf) ev.push({t:tf,html:'📨 Seguito '+f.n+' a <span class="chi-b">'+esc(x.nome)+'</span>'});
    });
    const tg=parseTs(x.gestito_il);
    if(tg) ev.push({t:tg,html:'💬 Gestita la risposta di <span class="chi-b">'+esc(x.nome)+'</span>'+(calCount(x)&&(x.risposta_conferma||'').indexOf('calendly')>-1?' · 🔗 link call inviato':'')});
    if(x.prenotato){
      const tp=parseTs(x.prenotato_at)||tg||t0;
      if(tp) ev.push({t:tp,html:'🎯 <span class="chi-b">'+esc(x.nome)+'</span> ha PRENOTATO la call'});
    }
  });
  return ev.sort(function(a,b){return b.t-a.t}).slice(0,10);
}

/* ---- azioni server ---- */
async function post(url,body,esitoId){
  const es=document.getElementById(esitoId);
  if(es){es.textContent='…';es.style.color='var(--dim)';}
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(es){es.textContent=j.ok?'fatto ✓':'errore: '+j.errore;es.style.color=j.ok?'var(--verde)':'var(--rosso)';}
    if(j.ok)setTimeout(carica,400);
    return j.ok;
  }catch(e){if(es){es.textContent='errore rete (funziona solo da localhost:8766)';es.style.color='var(--rosso)';}return false;}
}
function salva(id){post('/salva',{id:id,messaggio:document.getElementById('ta'+id).value,quando:new Date().toISOString()},'es'+id);}
function approva(id,val){post('/approva',{id:id,approvato:val,quando:new Date().toISOString()},'es'+id);}
function escludi(ev,id,nome){
  ev.stopPropagation();
  if(!confirm('Escludere PER SEMPRE '+nome+'?'))return;
  post('/escludi',{id:id,quando:new Date().toISOString()},'es'+id);
}
function salvaSeguito(id,n){post('/salva_seguito',{id:id,n:n,testo:document.getElementById('fu'+id+'_'+n).value,quando:new Date().toISOString()},'esfu'+id+'_'+n);}
function toggle(id){
  aperti[id]=!aperti[id];
  const el=document.getElementById('sch'+id);
  if(el)el.classList.toggle('aperta',aperti[id]);
}

/* ---- filtri ---- */
let filtroAttivo='tutti';
const FILTRI=[
  {k:'tutti',n:'Tutti',f:function(x){return true}},
  {k:'risposto',n:'Ha risposto',f:function(x){return !!x.risposto}},
  {k:'inviati',n:'Contattati',f:function(x){return !!x.inviato}},
  {k:'approvare',n:'Da approvare',f:function(x){return !x.inviato&&!x.approvato}},
  {k:'calendly',n:'🔗 Con Calendly',f:function(x){return calCount(x)>0}},
  {k:'prenotato',n:'🎯 Prenotate',f:function(x){return !!x.prenotato}}
];
function setFiltro(k){filtroAttivo=k;carica();window.scrollTo({top:document.getElementById('filtri').offsetTop-80,behavior:'smooth'});}

/* ---- scheda lead ---- */
function rankAzione(x){
  if(x.risposto&&!x.gestito)return 0;
  if(!x.approvato&&!x.inviato)return 1;
  if(x.inviato&&!x.risposto)return 2;
  if(x.risposto&&x.gestito)return 3;
  if(x.prenotato)return 5;
  return 4;
}
function schedaHtml(x){
  const bloccato=!!x.inviato;
  let corpo='';
  if(x.risposta_testo)
    corpo+='<div class="box-msg loro"><b>Lui/lei ha scritto</b>'+esc(x.risposta_testo)+'</div>';
  if(x.risposta_conferma)
    corpo+='<div class="box-msg"><b>Nostra risposta</b>'+esc(x.risposta_conferma)+'</div>';
  if(!bloccato&&!x.escluso){
    corpo+='<div class="box-msg"><b>Messaggio da inviare (modificabile)</b></div>'+
      '<textarea id="ta'+x.id+'">'+esc(x.messaggio)+'</textarea>'+
      '<div class="azioni">'+
        '<button class="btn" onclick="salva('+x.id+')">Salva</button>'+
        (x.approvato?'<button class="btn ghost" onclick="approva('+x.id+',false)">Metti in revisione</button>'
                    :'<button class="btn verde" onclick="approva('+x.id+',true)">Approva ✓</button>')+
        '<button class="btn pericolo" onclick="escludi(event,'+x.id+',\''+esc(x.nome).replace(/'/g,'')+'\')">Escludi</button>'+
        '<span class="esito" id="es'+x.id+'"></span>'+
      '</div>';
  }else if(bloccato&&x.messaggio&&!x.risposta_conferma&&!x.risposta_testo){
    corpo+='<div class="box-msg"><b>Messaggio inviato '+fmt(x.inviato)+'</b>'+esc(x.messaggio)+'</div>';
  }
  if(x.prossima_azione&&x.prossima_azione.quando)
    corpo+='<div class="prossimo-passo"><b>📌 Prossimo passo</b> — entro il '+fmtData(x.prossima_azione.quando)+': '+esc(x.prossima_azione.cosa)+'</div>';
  const seg=(x.seguiti||[]);
  if(seg.length&&!x.escluso){
    if(x.risposto||x.prenotato||x.stop_seguiti){
      corpo+='<div class="nota-msg">Seguiti automatici: fermati (ha risposto).</div>';
    }else{
      const date=dateSeguiti(x);
      corpo+='<div class="nota-msg" style="font-weight:700;color:var(--testo);margin-top:12px">Prossimi messaggi automatici (se non risponde)</div>';
      seg.forEach(function(f,i){
        const quando=f.inviato?'inviato '+fmt(f.inviato):'previsto '+(date[i].due?fmtData(date[i].due):'—');
        if(f.inviato){
          corpo+='<div class="box-msg" style="opacity:.6"><b>Seguito '+f.n+' · '+quando+'</b>'+esc(f.testo)+'</div>';
        }else{
          corpo+='<div class="nota-msg">Seguito '+f.n+' · '+quando+'</div>'+
            '<textarea id="fu'+x.id+'_'+f.n+'" style="min-height:60px">'+esc(f.testo)+'</textarea>'+
            '<div class="azioni"><button class="btn ghost" onclick="salvaSeguito('+x.id+','+f.n+')">Salva seguito</button><span class="esito" id="esfu'+x.id+'_'+f.n+'"></span></div>';
        }
      });
    }
  }
  return '<div class="scheda'+(aperti[x.id]?' aperta':'')+'" id="sch'+x.id+'">'+
    '<div class="testata" onclick="toggle('+x.id+')">'+
      '<span class="pallino '+classePallino(x)+'"></span>'+
      '<div class="chi"><span class="n">'+esc(x.nome)+'</span><span class="r'+(nonVerificato(x)?' r-attesa':'')+'">'+esc(ruoloVisibile(x).slice(0,55))+'</span>'+statoIcone(x)+'</div>'+
      (x.profilo?'<a class="profilo-l" href="'+esc(x.profilo)+'" target="_blank" onclick="event.stopPropagation()">Apri ↗</a>':'')+
      (x.escluso?'':'<button class="x" title="Escludi" onclick="escludi(event,'+x.id+',\''+esc(x.nome).replace(/'/g,'')+'\')">✕</button>')+
    '</div>'+
    '<div class="corpo">'+corpo+'</div>'+
  '</div>';
}

/* ---- render ---- */
async function carica(){
  try{
    const r=await fetch('outreach-data.json?t='+Date.now());
    const d=await r.json();
    const c=d.contatti;
    const attivi=c.filter(function(x){return !x.escluso});
    const fuori=c.filter(function(x){return x.escluso});
    const inv=attivi.filter(function(x){return x.inviato}).length;
    const ris=attivi.filter(function(x){return x.risposto}).length;
    document.getElementById('k_pren').textContent=attivi.filter(function(x){return x.prenotato}).length;
    document.getElementById('k_tot').textContent=c.length;
    document.getElementById('k_inv').textContent=inv;
    document.getElementById('k_ris').innerHTML=ris+(inv?'<small> · '+Math.round(ris/inv*100)+'%</small>':'');
    document.getElementById('k_cal').textContent=c.reduce(function(s,x){return s+calCount(x)},0);
    document.getElementById('k_app').textContent=attivi.filter(function(x){return !x.inviato&&!x.approvato}).length;
    document.getElementById('agg').textContent='aggiornato '+fmt(d.aggiornato)+' · '+attivi.length+' in lavorazione · '+fuori.length+' esclusi';

    const df=listaDaFare(c);
    document.getElementById('df_cnt').textContent=df.length;
    document.getElementById('dafare').innerHTML=df.map(function(i){
      return '<div class="riga'+(i.urg?' urgente':'')+'">'+i.html+(i.link?'<a href="'+esc(i.link)+'" target="_blank">apri ↗</a>':'')+'</div>';
    }).join('')||'<div class="vuoto">Niente da fare ora: tutto in mano alle routine.</div>';

    const ft=listaFatto(c);
    document.getElementById('ft_cnt').textContent=ft.length;
    document.getElementById('fatto').innerHTML=ft.map(function(e){
      return '<div class="riga"><span class="quando">'+fmt(e.t)+'</span>'+e.html+'</div>';
    }).join('')||'<div class="vuoto">Nessuna attività recente.</div>';

    document.getElementById('filtri').innerHTML=FILTRI.map(function(ft){
      const n=(ft.k==='tutti'?attivi:attivi.filter(ft.f)).length;
      return '<button class="filtro'+(filtroAttivo===ft.k?' on':'')+'" onclick="setFiltro(\''+ft.k+'\')">'+ft.n+'<span class="fn">'+n+'</span></button>';
    }).join('');
    const fx=(FILTRI.find(function(f){return f.k===filtroAttivo})||FILTRI[0]).f;
    const visibili=attivi.filter(fx).slice().sort(function(a,b){return rankAzione(a)-rankAzione(b)});
    document.getElementById('lista').innerHTML=visibili.map(schedaHtml).join('')||'<div class="vuoto">Nessun lead per questo filtro.</div>';
    document.getElementById('esclusi').innerHTML=fuori.map(schedaHtml).join('');
    document.getElementById('arch_t').textContent='Archivio esclusi ('+fuori.length+')';
  }catch(e){document.getElementById('agg').textContent='errore lettura dati: '+e.message;}
}
carica();
setInterval(function(){
  const inEdit=document.activeElement&&document.activeElement.tagName==='TEXTAREA';
  if(!inEdit)carica();
},5000);
</script>
</body>
</html>

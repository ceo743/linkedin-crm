<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulenza 1:1 · Ads · DC Academy</title>
<style>
  :root{
    --bg:#0e1420; --card:#161f30; --card-2:#1c2740; --ink:#f4f6fb; --muted:#8b96ad;
    --teal:#2ea8a8; --teal-soft:#12313380; --orange:#ff6b35; --green:#3ddc84; --red:#ff5c5c; --amber:#f5b942;
    --radius:18px; --shadow:0 1px 3px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.35); --border:#26314a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:
    radial-gradient(ellipse at 20% -10%, #16324a55, transparent 60%),
    radial-gradient(ellipse at 90% 0%, #6b2f1f44, transparent 55%), var(--bg);
    color:var(--ink);padding:36px 4vw 70px;min-height:100vh}
  a.back{display:inline-block;color:var(--muted);font-size:12px;text-decoration:none;margin-bottom:14px}
  a.back:hover{color:var(--teal)}
  .kicker{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;font-weight:700}
  h1{font-size:clamp(26px,3.2vw,38px);font-weight:800;margin:6px 0 4px;letter-spacing:-.01em}
  h1 .ia{color:var(--orange)} h1 .rest{color:var(--teal)}
  .sub{color:var(--muted);font-size:13px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:6px}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
  .live::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .periodo-bar{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .periodo-bar .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .seg{display:inline-flex;background:#0f1729;border:1px solid var(--border);border-radius:12px;padding:4px;gap:3px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:9px;cursor:pointer;transition:all .15s;font-family:inherit}
  .seg button:hover{color:var(--ink)} .seg button.on{background:linear-gradient(180deg,var(--orange),#e85a28);color:#0c0f16}
  .periodo-desc{font-size:12px;color:var(--muted)}
  #content.swap{animation:swap .35s ease}
  @keyframes swap{from{opacity:.25;transform:translateY(6px)}to{opacity:1;transform:none}}
  .section-title{font-size:12.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:32px 0 14px;display:flex;align-items:center;gap:10px}
  .section-title .line{flex:1;height:1px;background:var(--border)}
  .card{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px}

  .sintesi{display:flex;gap:26px;flex-wrap:wrap;background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-top:22px;box-shadow:var(--shadow)}
  .sintesi .s{min-width:90px}
  .sintesi .s .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .sintesi .s .v{font-size:28px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .sintesi .s .v.accent{color:var(--orange)} .sintesi .s .v.good{color:var(--green)}

  .mtoggle{display:inline-flex;background:#0f1729;border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px;flex-wrap:wrap}
  .mtoggle button{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
  .mtoggle button.on{background:var(--teal);color:#08131a}
  .barrow{display:flex;align-items:center;gap:12px;margin:12px 0}
  .barrow .bname{width:150px;font-size:13px;font-weight:700;color:var(--ink);flex-shrink:0;line-height:1.2}
  .barrow .btrack{flex:1;background:#0f1729;border-radius:9px;height:30px;border:1px solid var(--border);overflow:hidden}
  .barrow .bfill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--teal),var(--orange));display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:12.5px;font-weight:800;color:#08131a;min-width:42px;transition:width .5s cubic-bezier(.2,.7,.3,1)}
  .barrow.best .bname::after{content:" 🏆";font-size:12px}
  .barrow.off .bfill{background:linear-gradient(90deg,#5b6785,#7a869f)}

  .grid-camp{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .campcard{padding:16px 18px}
  .campcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .campcard .nome{font-size:15px;font-weight:800;line-height:1.25}
  .campcard .stato{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .campcard .stato.on{color:var(--green);background:#3ddc8415;border:1px solid #3ddc8440}
  .campcard .stato.off{color:var(--amber);background:#f5b94215;border:1px solid #f5b94240}
  .campcard .mini{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .campcard .mini b{display:block;font-size:15px;color:var(--ink);font-weight:800}
  .campcard .mini .cpr b{color:var(--orange)}
  .campcard a{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;color:var(--teal);text-decoration:none;border:1px solid var(--border);border-radius:9px;padding:6px 12px}
  .campcard a:hover{background:var(--teal-soft);border-color:var(--teal)}

  footer{margin-top:44px;font-size:11px;color:var(--muted);line-height:1.7;border-top:1px solid var(--border);padding-top:16px}
  footer a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>

<div>
  <a class="back" href="index.html">← Tutte le dashboard</a>
  <div class="kicker">DC ACADEMY · AD PERFORMANCE</div>
  <h1><span class="ia">Consulenza 1:1</span> <span class="rest">Ads</span></h1>
  <div class="sub">
    <span style="color:var(--amber);font-weight:700">obiettivo: call su Calendly</span>
    <span class="live" id="h-live">…</span>
    <span id="h-aggiornato"></span>
  </div>
  <div class="periodo-bar"><span class="lab">Periodo</span><div class="seg" id="seg"></div><span class="periodo-desc" id="periodo-desc"></span></div>
</div>

<div id="content">
  <div class="sintesi" id="sintesi"></div>
  <div class="section-title">Confronto tra le campagne <div class="line"></div></div>
  <div class="card">
    <div class="mtoggle" id="mtoggle"></div>
    <div id="bars"></div>
  </div>
  <div class="section-title">Le campagne <div class="line"></div></div>
  <div class="grid-camp" id="camp-row"></div>
</div>

<footer>
  Consulenza 1:1 (analisi gratuita + call Calendly) · account Meta 465327538443110 · via JARVIS.<br>
  <a id="link-ads-manager" href="#" target="_blank">Apri in Meta Ads Manager →</a> · <a href="account1-ads-dati.json" target="_blank">dati (JSON)</a>
</footer>

<script>
const num=(n,d=0)=>n==null?'—':Number(n).toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
const eur=(n,d=2)=>n==null?'—':'€'+Number(n).toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
const eur0=(n)=>eur(n,0);
const pct=(n,d=2)=>n==null?'—':Number(n).toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d})+'%';
let D=null,P=null,METRIC='call';
const ORD=['oggi','ieri','7g','30g','max'];
const METRICS=[{k:'call',lab:'Call',get:c=>c.risultati,fmt:v=>num(v),hi:true},{k:'spesa',lab:'Spesa',get:c=>c.spesa,fmt:v=>eur(v),hi:false},{k:'costo',lab:'Costo/call',get:c=>c.costo_risultato,fmt:v=>eur(v,0),hi:false,low:true},{k:'ctr',lab:'CTR',get:c=>c.ctr,fmt:v=>pct(v),hi:true},{k:'click',lab:'Click',get:c=>c.click,fmt:v=>num(v),hi:true}];

async function carica(){let d,live=true;try{const r=await fetch('account1-ads-dati.json',{cache:'no-store'});if(!r.ok)throw 0;d=await r.json();}catch(e){live=false;d=EMBEDDED;}boot(d,live);}

function boot(d,live){
  D=d;
  document.getElementById('h-live').textContent=live?'dati live':'ultimo snapshot';
  document.getElementById('h-aggiornato').textContent='agg. '+new Date(d.aggiornato).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('link-ads-manager').href=d.account.link_ads_manager;
  const keys=ORD.filter(k=>d.periodi&&d.periodi[k]);
  document.getElementById('seg').innerHTML=keys.map(k=>`<button data-k="${k}">${d.periodi[k].label}</button>`).join('');
  document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>sel(b.dataset.k));
  document.getElementById('mtoggle').innerHTML=METRICS.map(m=>`<button data-m="${m.k}">${m.lab}</button>`).join('');
  document.querySelectorAll('#mtoggle button').forEach(b=>b.onclick=()=>{METRIC=b.dataset.m;renderBars();markMetric();});
  sel(d.periodo_default&&d.periodi[d.periodo_default]?d.periodo_default:keys[keys.length-1]);
}

function markMetric(){document.querySelectorAll('#mtoggle button').forEach(b=>b.classList.toggle('on',b.dataset.m===METRIC));}

function sel(k){
  P=D.periodi[k];
  document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',b.dataset.k===k));
  document.getElementById('periodo-desc').textContent=P.descrizione?'· '+P.descrizione:'';
  const c=document.getElementById('content');c.classList.remove('swap');void c.offsetWidth;c.classList.add('swap');
  render();
}

function render(){
  const t=P.totali;
  const costoCall=t.call?t.spesa/t.call:null;
  document.getElementById('sintesi').innerHTML=`
    <div class="s"><div class="k">Spesa</div><div class="v accent">${eur0(t.spesa)}</div></div>
    <div class="s"><div class="k">Call prenotate</div><div class="v good">${num(t.call)}</div></div>
    <div class="s"><div class="k">Costo per call</div><div class="v">${eur(costoCall,0)}</div></div>
    <div class="s"><div class="k">CTR</div><div class="v">${pct(t.ctr)}</div></div>`;
  markMetric();renderBars();
  document.getElementById('camp-row').innerHTML=[...(P.campagne||[])].sort((a,b)=>(b.spesa||0)-(a.spesa||0)).map(c=>{const on=c.stato==='ACTIVE';return `
    <div class="card campcard"><div class="top"><div class="nome">${c.nome}</div><div class="stato ${on?'on':'off'}">${on?'attiva':'in pausa'}</div></div>
      <div class="mini"><div>Spesa<b>${eur(c.spesa)}</b></div><div>Call<b>${num(c.risultati)}</b></div><div class="cpr">Costo/call<b>${eur(c.costo_risultato,0)}</b></div><div>CTR<b>${pct(c.ctr)}</b></div></div>
      <a href="https://business.facebook.com/adsmanager/manage/campaigns?act=${D.account.id}&selected_campaign_ids=${c.id}" target="_blank">Apri in Ads Manager →</a>
    </div>`;}).join('');
}

function renderBars(){
  const camp=P.campagne||[];const M=METRICS.find(m=>m.k===METRIC);
  const vals=camp.map(c=>({c,v:M.get(c)}));
  const nums=vals.map(x=>x.v||0);
  const max=Math.max(...nums,0.0001);
  const pos=nums.filter(v=>v>0);
  const best=M.low?(pos.length?Math.min(...pos):null):Math.max(...nums);
  vals.sort((x,y)=>(y.v||0)-(x.v||0));
  document.getElementById('bars').innerHTML=vals.map(({c,v})=>{
    const isBest=M.hi&&(v||0)===best&&(v||0)>0 || (M.low&&v===best&&v>0);
    const off=c.stato!=='ACTIVE';
    return `<div class="barrow ${isBest?'best':''} ${off?'off':''}">
      <div class="bname">${c.nome}</div>
      <div class="btrack"><div class="bfill" style="width:${v?Math.max(8,(v/max)*100):8}%">${v!=null?M.fmt(v):'—'}</div></div>
    </div>`;}).join('');
}

const EMBEDDED={"aggiornato":"2026-07-17T08:35:00+02:00","account":{"id":"465327538443110","link_ads_manager":"#"},"periodo_default":"30g","periodi":{"30g":{"label":"Ultimi 30 giorni","descrizione":"ultimi 30 giorni","totali":{"spesa":3144.35,"click":3664,"ctr":2.35,"call":13},"campagne":[]}}};
carica();
</script>
</body>
</html>
